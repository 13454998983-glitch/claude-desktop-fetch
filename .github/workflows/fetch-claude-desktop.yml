name: Fetch Claude Desktop MSIX

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium
          
      - name: Download MSIX
        run: |
          cat > dl.cjs << 'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs'), path = require('path');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const ctx = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              acceptDownloads: true
            });
            const page = await ctx.newPage();
            
            let dlPath = null;
            const dlPromise = new Promise((resolve) => {
              page.on('download', async (dl) => {
                const fp = path.join(process.cwd(), dl.suggestedFilename());
                await dl.saveAs(fp);
                dlPath = fp;
                resolve(fp);
              });
            });
            
            const href = 'https://claude.ai/api/desktop/win32/x64/setup/latest/redirect';
            await page.goto(href, { timeout: 30000 }).catch(() => {});
            
            // Wait up to 10 minutes for download
            await Promise.race([dlPromise, new Promise(r => setTimeout(r, 600000))]);
            await browser.close();
            
            if (dlPath) {
              const s = fs.statSync(dlPath).size;
              console.log('FILE:', dlPath, s, 'bytes');
              if (s > 50000000) console.log('OK');
              else console.log('TOO_SMALL');
            } else {
              console.log('NO_DOWNLOAD');
              process.exit(1);
            }
          })();
          EOF
          node dl.cjs
          
      - name: Upload to transfer.sh
        run: |
          for f in *.msix *.exe; do
            [ -f "$f" ] || continue
            sz=$(stat -c%s "$f")
            echo "Uploading $f ($sz bytes) to transfer.sh..."
            curl --upload-file "$f" "https://transfer.sh/$f" -v 2>&1 | tee -a transfer-urls.txt
            echo "---" >> transfer-urls.txt
          done
          cat transfer-urls.txt
          
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: claude-installer
          name: Claude Desktop
          files: |
            *.msix
            transfer-urls.txt
          draft: false
          prerelease: false
          fail_on_unmatched_files: false