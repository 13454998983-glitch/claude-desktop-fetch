name: Fetch Claude Desktop MSIX

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium
          
      - name: Download Claude Desktop MSIX
        run: |
          cat > dl.js << 'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const path = require('path');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              acceptDownloads: true
            });
            const page = await context.newPage();
            
            const dlPromise = new Promise((resolve, reject) => {
              const t = setTimeout(() => reject(new Error('timeout')), 120000);
              page.on('download', async (dl) => {
                clearTimeout(t);
                const fp = path.join(process.cwd(), dl.suggestedFilename());
                await dl.saveAs(fp);
                console.log('Size:', fs.statSync(fp).size);
                resolve(fp);
              });
            });
            
            await page.goto('https://claude.com/download', { waitUntil: 'networkidle', timeout: 30000 });
            const btn = await page.$('[data-app-download="win-x64"] a');
            if (!btn) { console.log('No button found'); process.exit(1); }
            const href = await btn.getAttribute('href');
            console.log('MSIX URL:', href);
            await page.goto(href, { timeout: 30000 }).catch(() => {});
            
            await dlPromise;
            await browser.close();
            
            // Verify we have the MSIX
            const files = fs.readdirSync('.').filter(f => f.endsWith('.msix'));
            console.log('Files:', files);
            files.forEach(f => console.log(f, fs.statSync(f).size, 'bytes'));
          })();
          EOF
          node dl.js
          
      - name: Split MSIX into parts
        run: |
          MSIX=$(ls *.msix | head -1)
          echo "Splitting $MSIX ($(stat -c%s $MSIX) bytes)"
          split -b 50M -d "$MSIX" claude-msix-part-
          ls -lh claude-msix-part-*
          
      - name: Upload to transfer.sh
        run: |
          MSIX=$(ls *.msix | head -1)
          echo "Uploading to transfer.sh..."
          curl --upload-file "$MSIX" https://transfer.sh/Claude.msix -v 2>&1 | tee transfer-url.txt
          echo "Transfer URL:"
          cat transfer-url.txt
          
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: claude-installer
          name: Claude Desktop MSIX
          files: |
            *.msix
            transfer-url.txt
          draft: false
          prerelease: false
          fail_on_unmatched_files: false