name: Fetch Claude Desktop Installer

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium
          
      - name: Download Claude Desktop via browser
        run: |
          cat > download.js << 'ENDOFSCRIPT'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const path = require('path');
          
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              acceptDownloads: true
            });
            const page = await context.newPage();
            
            const redirectUrl = 'https://claude.ai/api/desktop/win32/x64/setup/latest/redirect';
            let downloadPath = null;
            
            const downloadPromise = new Promise((resolve, reject) => {
              setTimeout(() => reject(new Error('Download timeout')), 120000);
              page.on('download', async (download) => {
                const fname = download.suggestedFilename() || 'Claude-Setup-x64.exe';
                const fpath = path.join(process.cwd(), fname);
                await download.saveAs(fpath);
                const size = fs.statSync(fpath).size;
                console.log(`Downloaded: ${fname} = ${(size/1024/1024).toFixed(1)} MB`);
                downloadPath = fpath;
                resolve(fpath);
              });
            });
            
            try {
              await page.goto(redirectUrl, { timeout: 30000 });
            } catch (e) {
              if (e.message && e.message.includes('Download is starting')) {
                console.log('Download triggered (expected)');
              }
            }
            
            try { await downloadPromise; } catch (e) { console.log('Download error:', e.message); }
            await browser.close();
          })();
          ENDOFSCRIPT
          
          node download.js
          
      - name: Create Release and Upload
        uses: softprops/action-gh-release@v1
        with:
          tag_name: claude-installer
          name: Claude Desktop Installer
          files: |
            *.exe
            *.msix
          draft: false
          prerelease: false